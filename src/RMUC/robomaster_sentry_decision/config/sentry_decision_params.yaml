# ========== 攻击优先级目标列表（从上到下依次判断） ==========
priority_targets:
  - type: "hero_deploy"        # 部署模式英雄（特殊评分模型）
    weight_hp: 0.5             # 不使用，保留占位
    weight_distance: 0.35
    weight_ammo: 0.15
    threshold: 0.5
  - type: "infantry"           # 步兵
    weight_hp: 0.4
    weight_distance: 0.4
    weight_ammo: 0.2
    threshold: 0.5
  - type: "hero"               # 普通英雄
    weight_hp: 0.4
    weight_distance: 0.4
    weight_ammo: 0.2
    threshold: 0.5
  - type: "sentry"             # 哨兵
    weight_hp: 0.4
    weight_distance: 0.4
    weight_ammo: 0.2
    threshold: 0.5
  - type: "engineer"           # 工程
    weight_hp: 0.4
    weight_distance: 0.4
    weight_ammo: 0.2
    threshold: 0.5
