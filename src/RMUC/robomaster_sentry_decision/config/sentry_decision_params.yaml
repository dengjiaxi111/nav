# ========== 坐标点（单位：cm） ==========
# 初始化前置安全点：开局先到这里，再发送前哨站攻击点
init_pre_attack_x: 1956.0
init_pre_attack_y: 1316.0

# 前哨站攻击点：初始化打前哨站，以及主流程最后固定驻守点
red_attack_x: 1494.0
red_attack_y: 380.0
blue_attack_x: 1494.0
blue_attack_y: 380.0

# 补给区仍按红蓝方分开
red_supply_x: 176.0
red_supply_y: 262.0
blue_supply_x: 2578.0
blue_supply_y: 1214.0

# 主流程中间点：红蓝方当前使用同一个点
red_main_route_x: 848.0
red_main_route_y: 184.0
blue_main_route_x: 848.0
blue_main_route_y: 184.0

# 主流程驻守点：使用前哨站攻击点，补给/复活后也按时间脚本回到对应点
red_main_decision_x: 1494.0
red_main_decision_y: 380.0
blue_main_decision_x: 1494.0
blue_main_decision_y: 380.0

# 敌方前哨站坐标：用于初始化阶段 GIMBAL_OUTPOST + 不转时计算 target_yaw_deg
red_enemy_outpost_x: 0.0
red_enemy_outpost_y: 0.0
blue_enemy_outpost_x: 0.0
blue_enemy_outpost_y: 0.0

# ========== 行为参数 ==========
arrival_wait_time: 1.0
deviation_threshold: 50.0
init_attack_duration: 60.0
supply_threshold: 0.3
max_hp: 400.0
max_ammo: 300.0

# ========== 主流程时间脚本 ==========
# 比赛剩余时间 <= 5min20s 时发送 (848,184)
main_first_switch_remaining_time: 320.0
# 比赛剩余时间 <= 4min40s 时发送 (1494,380)
main_second_switch_remaining_time: 280.0
# 比赛剩余时间 <= 4min10s 时再次发送 (848,184)，到点后小陀螺
main_third_switch_remaining_time: 250.0
# 第二次到 (848,184) 后停留多久，再回前哨站攻击点
main_second_route_point_stay_duration: 666.0

# ========== 发布周期 ==========
publish_interval_ms: 100
target_publish_interval_ms: 5000

# ========== 工程屏蔽区保留 ==========
# 决策不再追敌，但 control 中仍会根据工程是否处于取矿屏蔽区设置 avoidengineer_flag
priority_targets:
  - type: "engineer"
    weight_hp: 0.4
    weight_distance: 0.4
    weight_ammo: 0.2
    threshold: 0.5
