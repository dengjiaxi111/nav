max_ammo: 300.0

# ========== 发布周期 ==========
publish_interval_ms: 100
# 目标点变化立即发布；未到达同目标点时按该间隔保活。
target_publish_interval_ms: 2000
# 已到达当前行为目标后，继续按该间隔保活发布当前目标点。
target_arrived_publish_interval_ms: 5000
