# NMPC Controller ROS2 参数配置
# 用于 nav_server 节点

nmpc:
  # YAML 配置文件路径 (可选,用于高级调参)
  config_file: ""  # 留空则使用下面的默认参数
  
  # 约束参数 (运行时可调)
  max_linear_vel: 2.0       # 最大线速度 (m/s)
  max_angular_vel: 2.0      # 最大角速度 (rad/s)
  max_linear_accel: 2.0     # 最大线加速度 (m/s²)
  max_angular_accel: 3.0    # 最大角加速度 (rad/s²)
  
  # 局部参考轨迹提取
  horizon_length: 5.0       # 前向提取距离 (米)
  desired_velocity: 1.0     # 期望速度 (m/s)
  
  # 代价权重 (运行时可调)
  Q_position: 10.0          # 位置跟踪权重
  Q_orientation: 5.0        # 航向角权重
  Q_velocity: 1.0           # 速度权重
  R_linear: 0.1             # 线加速度平滑性
  R_angular: 0.1            # 角加速度平滑性
  terminal_multiplier: 2.0  # 终端代价倍数
  
  # 目标容差
  xy_tolerance: 0.1         # 位置容差 (米)
  yaw_tolerance: 0.1        # 航向容差 (弧度)
  
  # 调试选项
  publish_predicted_path: true  # 发布预测轨迹
  publish_debug_markers: true  # 发布调试标记
