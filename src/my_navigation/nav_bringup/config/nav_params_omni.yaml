# Omni chassis navigation profile.
#
# This file is intentionally small. Parameters not listed here use the
# nav_server/NMPC defaults. Keep this profile separate from nav_params.yaml so
# wheel-leg bringup remains stable while the omni migration is developed.

nav_server:
  ros__parameters:
    use_static_map_odom: false
    debug_reset_odom_to_base_link: false

    control_rate: 50.0
    goal_timeout: 60.0
    goal_tolerance: 0.1
    yaw_tolerance: 0.1

    map_frame: "map"
    odom_frame: "odom"
    base_frame: "base_link_fake"

    enable_static_layer: true
    enable_dynamic_layer: true
    dynamic_layer_topic: "/rog_map/map_2d"

    dynamic_tracking:
      enable: false

    special_terrain:
      enable_stair_layer: false
      enable_stair_fsm: false
      enable_stair_mode_detection: false
      enable_fly_slope_mode_detection: false
      enable_fly_slope_layer: false
      publish_stair_debug_markers: false

    nmpc:
      odom_topic: "/Odometry/fake"
      chassis_odom_topic: "/Odometry/fake"
      odom_feedback_alpha: 0.0

      max_linear_vel: 0.5
      max_angular_vel: 1.0
      max_linear_accel: 1.0
      max_linear_decel: 1.0
      max_angular_accel: 2.0
      allow_reverse: false

      horizon_length: 1.5
      desired_velocity: 0.5
      speed_profile:
        enable: true
        v_cruise: 0.5
        v_min: 0.1
        max_lateral_accel: 1.0
        kappa_epsilon: 0.08
        curvature_window_m: 1.0

      startup_align:
        enable: true
        enter_thresh: 0.45
        exit_thresh: 0.15
        lookahead: 0.40
        kp: 1.5
        min_angular_vel: 0.15
        max_angular_vel: 0.8

      vel_lag_tau: 0.3
      omega_lag_tau: 0.3

omni_cmd_adapter:
  ros__parameters:
    input_cmd_vel_topic: "/cmd_vel_fake"
    output_cmd_vel_topic: "/cmd_vel"
    source_odom_topic: "/Odometry"
    fake_odom_topic: "/Odometry/fake"

    parent_frame: "base_link"
    fake_frame: "base_link_fake"
    odom_frame: "odom"

    use_fake_vel: true
    fake_vel_on: true
    publish_tf: true
    publish_fake_odom: true
    publish_zero_on_timeout: true

    publish_rate_hz: 50.0
    cmd_timeout_sec: 0.2
    initial_fake_yaw: 0.0
    fake_angular_speed_coefficient: 1.0
