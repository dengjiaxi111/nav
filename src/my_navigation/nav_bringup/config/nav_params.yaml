# 导航参数配置

nav_server:
  ros__parameters:
    # 地图路径由 navigation.launch.py 注入
    map_file: ""
    control_rate: 100.0
    goal_timeout: 60.0
    goal_tolerance: 0.1
    yaw_tolerance: 0.1
    
    # 坐标系配置
    map_frame: "map"
    base_frame: "base_link"
    odom_frame: "odom"
    
    # 控制器超时保护
    controller_timeout: 10.0  # 控制器无进展超时(秒)
    controller_progress_threshold: 0.15  # 进展检测距离阈值(米)
    
    # 周期性路径检查 (动态障碍物应对，默认启用)
    path_check_period: 0.1  # 路径检查周期(秒) - 降低以快速响应动态障碍物
    path_lateral_tolerance: 0.25  # 横向偏离路径容忍度(米)，超过则重规划
    # 说明: 系统每隔 path_check_period 秒检查机器人到路径的最短距离
    # 如果横向偏离超过 path_lateral_tolerance，会停止并重新规划
    # path_check_period 越小响应越快，但会增加 CPU 负载（建议 0.2-1.0 秒）
    
    # ============ 分层地图系统 ============
    # 静态层: 从yaml/pgm文件加载的全局地图
    enable_static_layer: true   # 启用静态层（默认启用）
    # 说明: 
    #   - 启用时: 从map_file加载pgm/yaml静态地图
    #   - 禁用时: 自动创建50x50m空白地图框架（纯动态SLAM模式）
    # 注意: 禁用静态层时，必须启用动态层，否则无障碍物信息
    
    # 动态层: 来自rog_map的局部障碍物
    enable_dynamic_layer: false  # 启用动态层融合
    dynamic_layer_topic: "/rog_map/map_2d"  # 局部障碍物地图话题 (odom坐标系)
    # 说明: 动态层会自动从odom坐标系投影到map坐标系，并与静态地图融合

    # ============ 特殊地形层（stair layer）============
    special_terrain:
      enable_stair_layer: true
      stair_mask_yaml: ""   # 由 navigation.launch.py 注入
      stair_clear_perp_dist_m: 0.5
      # 双向台阶像素范围（高侧=black，低侧=gray）
      black_min: 1
      black_max: 25
      gray_min: 100
      gray_max: 140
      pair_search_radius_cells: 4
      # 单向台阶（仅允许高->低，禁止低->高）
      enable_oneway_stair_down: true
      oneway_black_min: 26
      oneway_black_max: 100
      oneway_gray_min: 141
      oneway_gray_max: 230
      publish_stair_debug_markers: true
      debug_marker_max_segments: 1500
    
    # ============ 地图更新性能日志 ============
    enable_performance_logging: false  # 启用地图更新性能日志 (开发/调试时启用)
    # 说明: 启用后会在控制台输出地图融合、ESDF/Costmap重建的详细耗时
    
    # ============ ESDF 地图 ============
    enable_esdf: true
    esdf_vis_max_dist: 2.0      # 可视化最大距离(m)
    
    # Costmap 膨胀
    inflation:
      radius: 0.8              # 膨胀半径(m)
      inscribed_radius: 0.2    # 内切圆半径(m)，致命代价区
      cost_scaling: 1.8        # 指数衰减因子
      decay_type: exponential  # linear 或 exponential
    
    # 规划器
    planner:
      obstacle_threshold: 100   # 障碍物阈值
      cost_weight: 1.5         # 代价权重 (越大越远离障碍物)
      enable_smooth: true      # 启用 B样条平滑
      resample_interval: 0.3   # 重采样间隔 (m)，控制曲线光滑度，越小越光滑
      smooth_resolution: 0.05  # 平滑后路径分辨率 (m)
      
      # 路径复用和剪枝
      enable_path_cache: true         # 启用路径缓存和复用
      enable_auto_prune: true         # 启用自动剪枝已驶过部分
      goal_tolerance: 0.2             # 目标变化阈值(米), 小于此值则认为目标未变化
      obstacle_check_threshold: 99    # 障碍物检查阈值, 路径上代价值 >= 此值视为障碍物
      esdf_warn_min_safe_dist: 0.12   # 平滑后ESDF预警最小安全距离(米)
      start_deviation_threshold: 1.0  # 起点偏离缓存路径阈值(米), 超过则强制重规划
      astar_max_attempts: 2           # A* 尝试次数
      astar_threshold_step: 10        # A* 每次重试降低的障碍物阈值步长
      prune_distance: 1.0            # 剪枝保留距离(米), 保留当前位置前方此距离内的点
      
      # B样条优化）
      enable_optimization: true    # 启用轨迹优化
      opt_lambda_smooth: 10.0      # 平滑项权重（弹性带）
      opt_lambda_collision: 10.0    # 障碍物项权重（ESDF 排斥）- 增大以远离墙壁
      opt_safe_dist: 0.8           # 安全距离阈值 (m)
      opt_max_iter: 50             # 最大迭代次数
      opt_curvature_adaptive: true # 曲率自适应（转角处更远离障碍物）
      opt_curvature_weight: 4.0    # 曲率加权系数 - 增大以在弯道处更远离墙壁
      
      # 窄通道中心线吸引（进出窄通道时走中间）
      narrow_passage_align: false   # 启用窄通道中心吸引
      narrow_passage_thresh: 0.7   # 窄通道判定阈值 (m)，ESDF距离小于此值的区域
      opt_lambda_align: 10.0       # 中心吸引权重 (降低，防止穿墙)
      align_entry_points: 3        # 入口/出口各优化几个点 (1-3)
      narrow_min_consecutive: 3    # 最少连续几个点才算窄通道（防止单点误判）

      # 台阶段方向约束（经过台阶时尽量垂直边沿）
      stair_segment_align: true
      opt_lambda_stair_align: 10.0
      stair_align_expand_points: 3  # 台阶命中点前后各扩展 n 个控制点参与方向优化
    
    
    # 控制器(Pure Pursuit)
    controller:
      lookahead_dist: 0.5
      max_linear_vel: 0.5
      max_angular_vel: 1.0
    
    # NMPC 控制器
    nmpc:
      # === 求解器维度 (必须与 export_ocp.py 一致!) ===
      N_horizon: 50              # 预测步数 N (与生成的 solver 保持一致)
      T_horizon: 1.5             # 预测时域 T (秒), dt = T/N = 0.05s
      
      # === 运动约束 ===
      max_linear_vel: 2.5        # 最大线速度 (m/s) - 降低以匹配实际执行能力
      max_angular_vel: 3.0       # 最大角速度 (rad/s) - 降低以防止失控旋转
      max_linear_accel: 5.0      # 最大线加速度 (m/s²) - 收紧以模拟真实惯性
      max_angular_accel: 4.0     # 最大角加速度 (rad/s²) - 关键！防止角速度过冲
      allow_reverse: false       # 倒车
      
      # === 局部参考轨迹提取 ===
      horizon_length: 4.5        # 前向提取距离 (米) - 缩短以增强近端跟踪
      desired_velocity: 2.0      # 期望跟踪速度 (m/s) - 降低以更稳定
      lateral_error_threshold: 0.15  # 横向误差阈值 (m)，超过时启用速度缩减策略
      
      # === 代价函数权重 ===
      Q_position: 50.0           # 位置 (x,y) 跟踪权重 - 降低以减少激进追踪
      Q_orientation: 30.0        # 航向角 (theta) 跟踪权重
      Q_velocity: 0.0            # 速度 (v,omega) 跟踪权重 - 降低以避免速度过冲
      R_linear: 0.0              # 线加速度平滑性权重 - 增大以抑制激进加速
      R_angular: 0.0             # 角加速度平滑性权重 - 显著增大以防止角速度过冲
      terminal_multiplier: 0.0   
      
      # === ESDF 障碍物代价 (新增) ===
      esdf_weight: 200.0         # ESDF 违反代价权重 (显著增大以防止切角)
      esdf_safe_dist: 0.8        # 安全距离 (m)，增大以提前排斥
      enable_esdf_cost: false     # ✅ 启用 ESDF 障碍物代价
      near_weight_multiplier: 2.0  # 近端权重倍增，强化近距离避障
      
      # === 容差参数 ===
      xy_tolerance: 0.15        # 位置到达容差 (米) - 增大以减少过冲
      # yaw_tolerance: 3.14       # 航向到达容差 (弧度) - 增大以减少旋转过冲 以弃用
      
      # === 可视化选项 ===
      publish_predicted_path: true   # 发布 NMPC 预测轨迹 (/nmpc/predicted_path)
      publish_debug_markers: true   # 发布调试标记
      
      # === 求解器参数 (高级选项) ===
      # 注意: N_horizon 和 T_horizon 在编译时固定 (model_ocp/export_ocp.py)
      # 当前设置: N=50, T=1.0s, dt=0.02s
      qp_solver_max_iter: 50    # QP 子问题最大迭代次数
      levenberg_marquardt: 1e-4 # 数值稳定性阻尼因子
    
    
    # 恢复行为
    recovery:
      backup_dist: 0.3
      backup_vel: -0.2
      spin_angle: 3.14
      spin_vel: 0.5
    
    # 脱困系统 (ESCAPING 状态)
    escape:
      # 触发条件
      trigger_costmap_threshold: 98   # Costmap 触发阈值，起点 cost >= 此值时触发脱困
      target_safe_esdf: 0.3           # 目标 ESDF 距离 (m)，搜索大于此值的安全点
      
      # 搜索参数
      search_radius: 5.0              # BFS 最大搜索半径 (m)
      
      # 控制参数
      rotation_speed: 1.0             # 旋转角速度 (rad/s)
      forward_speed: 0.5             # 前进线速度 (m/s)
      yaw_tolerance: 0.1              # 角度对齐容差 (rad, ~6度)
      position_tolerance: 0.1        # 到达位置容差 (m)
      
      # 超时保护
      timeout: 10.0                   # 脱困最大时长 (秒)，超时进入 RECOVERY
