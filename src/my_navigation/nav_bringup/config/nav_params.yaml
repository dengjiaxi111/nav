# 导航参数配置

nav_server:
  ros__parameters:
    # 静态重定位开关 (true: 从RViz的"2D Pose Estimate"接收初始位姿并作为固定的map->odom; false: 实际场地使用NDT重定位)
    use_static_map_odom: false
    
    # 地图路径由 navigation.launch.py 注入
    map_file: "/home/nuc/navigation2026/src/my_navigation/nav_bringup/maps/map.pgm"
    control_rate: 50.0
    goal_timeout: 60.0
    goal_tolerance: 0.1
    yaw_tolerance: 0.1
    
    # 坐标系配置
    map_frame: "map"
    base_frame: "base_link"
    odom_frame: "odom"
    
    # 控制器超时保护
    controller_timeout: 10.0  # 控制器无进展超时(秒)
    controller_progress_threshold: 0.15  # 进展检测距离阈值(米)
    
    # 周期性路径检查 (动态障碍物应对，默认启用)
    path_check_period: 0.1  # 路径检查周期(秒) - 降低以快速响应动态障碍物
    path_lateral_tolerance: 1.25  # 横向偏离路径容忍度(米)，超过则重规划
    # 说明: 系统每隔 path_check_period 秒检查机器人到路径的最短距离
    # 如果横向偏离超过 path_lateral_tolerance，会停止并重新规划
    # path_check_period 越小响应越快，但会增加 CPU 负载（建议 0.2-1.0 秒）

    # ============ 路径持久化/复用 ============
    path_io:
      enable_save_planned_path: false   # true: 每次规划成功后保存平滑路径
      planned_path_file: "/tmp/nav_planned_path.yaml"
      use_prior_path: false            # true: 规划阶段优先读取先验路径并直接送入控制器
      prior_path_file: "/tmp/nav_planned_path.yaml"
      validate_prior_path: false        # 读取后先做障碍物校验
      fallback_to_planner: false        # 先验路径不可用时回退到在线规划
    
    # ============ 分层地图系统 ============
    # 静态层: 从yaml/pgm文件加载的全局地图
    enable_static_layer: true   # 启用静态层（默认启用）
    # 说明: 
    #   - 启用时: 从map_file加载pgm/yaml静态地图
    #   - 禁用时: 自动创建50x50m空白地图框架（纯动态SLAM模式）
    # 注意: 禁用静态层时，必须启用动态层，否则无障碍物信息
    
    # 动态层: 来自rog_map的局部障碍物
    enable_dynamic_layer: true  # 启用动态层融合
    dynamic_layer_topic: "/rog_map/map_2d"  # 局部障碍物地图话题 (odom坐标系)
    # 说明: 动态层会自动从odom坐标系投影到map坐标系，并与静态地图融合

    # ============ 特殊地形层（stair layer）============
    special_terrain:
      enable_stair_layer: true
      # stair_mask_yaml: "/home/nuc/navigation2026/src/my_navigation/nav_bringup/maps/stair.yaml"   # 由 navigation.launch.py 注入
      stair_clear_perp_dist_m: 0.15 # 台阶边沿清理距离(米)，清除台阶边沿一定宽度内的障碍物标记，防止过于靠近边沿导致误判无法通过
      stair_clear_perp_high_dist_m: -1.0  # 高侧法向扩展清除距离(米), <0 表示回退到 stair_clear_perp_dist_m
      stair_clear_perp_low_dist_m: -1.0   # 低侧反法向扩展清除距离(米), <0 表示回退到 stair_clear_perp_dist_m
      # 双向台阶像素范围（高侧=black，低侧=gray）
      black_min: 1
      black_max: 25
      gray_min: 100
      gray_max: 140
      pair_search_radius_cells: 4
      # 单向台阶（仅允许高->低，禁止低->高）
      enable_oneway_stair_down: true
      oneway_black_min: 26
      oneway_black_max: 100
      oneway_gray_min: 141
      oneway_gray_max: 230
      publish_stair_debug_markers: true
      debug_marker_max_segments: 1500
      # 台阶模式输出（发布 stair_mode: 0=正常, 1=准备/执行跨阶）
      enable_stair_mode_detection: true
      stair_mode_trigger_distance_m: 1.3
      stair_mode_lookahead_dist_m: 2.0
      stair_mode_sample_step_m: 0.05
      stair_mode_entry_heading_error_max_rad: 0.2  # 进入 stair_mode=1 前航向对齐阈值(|path_heading - yaw|)
      stair_mode_release_grace_cycles: 2
      stair_mode_min_hold_sec: 0.40  # 抬腿信号最小保持时间(秒)，用于抑制 1->0 瞬时抖动
      stair_mode_force_release_distance_m: 2.6  # mode=1 时若检测到台阶距离过远(或无 upcoming)，强制回0
      stair_mode_max_assert_sec: 8.0   # mode=1 最大持续时间(秒)，超时强制回0，便于下次上升沿再次触发
      stair_mode_omega_limit_rad_s: 0.30  # stair_mode=1 时角速度上限 |omega| (rad/s)
      stair_mode_omega_slew_rate_rad_s2: 1.0  # stair_mode=1 时角速度斜坡限幅 (rad/s^2)
      # stair_mode=1 时采用固定速度，越过台阶段后自动回到 NMPC
      enable_stair_fixed_velocity_strategy: true
      stair_fixed_velocity_trigger_distance_m: 1.6  # 固定速度启用距离(米)，可与 stair_mode_trigger_distance_m 分离
      stair_fixed_linear_vel: 1.9
      stair_fixed_heading_kp: 1.0
      stair_fixed_max_angular_vel: 0.9
      stair_fixed_heading_deadband: 0.05
    
    # ============ 地图更新性能日志 ============
    enable_performance_logging: false  # 启用地图更新性能日志 (开发/调试时启用)
    # 说明: 启用后会在控制台输出地图融合、ESDF/Costmap重建的详细耗时
    
    # ============ ESDF 地图 ============
    enable_esdf: true
    esdf_vis_max_dist: 2.0      # 可视化最大距离(m)
    
    # Costmap 膨胀
    inflation:
      radius: 0.5              # 膨胀半径(m)
      inscribed_radius: 0.2    # 内切圆半径(m)，致命代价区
      cost_scaling: 1.8        # 指数衰减因子
      decay_type: exponential  # linear 或 exponential
    
    # 规划器
    planner:
      obstacle_threshold: 100   # 障碍物阈值
      cost_weight: 0.9         # 代价权重 (降低后更愿意通过窄通道)
      enable_smooth: true      # 启用 B样条平滑
      resample_interval: 0.3   # 重采样间隔 (m)，控制曲线光滑度，越小越光滑
      smooth_resolution: 0.05  # 平滑后路径分辨率 (m)
      
      # 路径复用和剪枝
      enable_path_cache: true         # 启用路径缓存和复用
      enable_auto_prune: true         # 启用自动剪枝已驶过部分
      goal_change_tolerance: 0.2      # 目标变化阈值(米), 小于此值则认为目标未变化
      obstacle_check_threshold: 99    # 障碍物检查阈值, 路径上代价值 >= 此值视为障碍物
      esdf_warn_min_safe_dist: 0.12   # 平滑后ESDF预警最小安全距离(米)
      start_deviation_threshold: 1.0  # 起点偏离缓存路径阈值(米), 超过则强制重规划
      astar_max_attempts: 1           # A* 尝试次数（避免无效重试）
      astar_threshold_step: 0         # 关闭反向收紧阈值重试
      prune_distance: 1.0            # 剪枝保留距离(米), 保留当前位置前方此距离内的点
      
      # B样条优化）
      enable_optimization: true    # 启用轨迹优化
      opt_lambda_smooth: 10.0      # 平滑项权重（弹性带）
      opt_lambda_collision: 10.0    # 障碍物项权重（ESDF 排斥）- 增大以远离墙壁
      opt_safe_dist: 0.5           # 安全距离阈值 (m)，降低以提高窄通道可行性
      opt_max_iter: 50             # 最大迭代次数
      opt_curvature_adaptive: true # 曲率自适应（转角处更远离障碍物）
      opt_curvature_weight: 4.0    # 曲率加权系数 - 增大以在弯道处更远离墙壁
      
      # 窄通道中心线吸引（进出窄通道时走中间）
      narrow_passage_align: false   # 启用窄通道中心吸引
      narrow_passage_thresh: 0.4   # 窄通道判定阈值 (m)，ESDF距离小于此值的区域
      opt_lambda_align: 10.0       # 中心吸引权重 (降低，防止穿墙)
      align_entry_points: 3        # 入口/出口各优化几个点 (1-3)
      narrow_min_consecutive: 3    # 最少连续几个点才算窄通道（防止单点误判）

      # 台阶段方向约束（经过台阶时尽量垂直边沿）
      stair_segment_align: true
      opt_lambda_stair_align: 25.0
      stair_align_expand_points: 5  # 兼容旧参数：仅当下方4个弧长窗口都<=0时才回退使用
      # 推荐：按弧长定义窗口，并区分上/下台阶
      stair_align_up_pre_dist_m: 1.5
      stair_align_up_post_dist_m: 0.45
      stair_align_down_pre_dist_m: 0.45
      stair_align_down_post_dist_m: 0.5
    
    
    # 控制器(Pure Pursuit)
    controller:
      lookahead_dist: 0.5
      max_linear_vel: 0.5
      max_angular_vel: 1.0
    
    # NMPC 控制器
    nmpc:
      # 注意: N_horizon/T_horizon、QP/LM 等仍由 acados 生成 solver 固化
      # 下方 Q/R/ESDF/contouring 参数已接入运行时注入，修改 YAML 可直接生效
      
      # === 运动约束 ===
      max_linear_vel: 1.8        # 最大线速度 (m/s) 
      max_angular_vel: 3.5       # 最大角速度 (rad/s)
      max_linear_accel: 1.3      # 最大线加速度 (m/s²)
      max_angular_accel: 4.0     # 最大角加速度 (rad/s²) 
      allow_reverse: false       # 倒车
      
      # === 局部参考轨迹提取 ===
      # horizon_length 与 desired_velocity 共同决定参考轨迹的运动学一致性：
      #   直道下：v_ref_implicit = horizon_length / T_horizon = desired_velocity
      #   故推荐 horizon_length = desired_velocity * T_horizon_solver (= 1.5 * 1.5 = 2.25m)
      # 速度一致性补丁（代码中已实施）：desired_v = min(desired_v, step_dist/dt)，
      #   确保速度参考不超过位置间距隐含的速度上限，消除代价函数内耗
      horizon_length: 2.25       # 直道参考弧长 (米)，= desired_velocity * T_horizon_solver
      desired_velocity: 1.7      # 期望巡航速度 (m/s)

      # 曲率自适应 horizon：effective_horizon = horizon_length / (1 + kappa_scale * kappa_max)
      # 同时自动压缩位置间距和速度参考上限（运动学一致），一致降低弯道速度
      # 典型效果（kappa_scale=0.5, horizon=2.25m）：
      #   κ=0/m (直道): horizon=2.25m → v_implicit=1.50 m/s
      #   κ=1/m       : horizon=1.50m → v_implicit=1.00 m/s
      #   κ=2/m       : horizon=1.12m → v_implicit=0.75 m/s
      #   κ=3/m       : horizon=0.90m → v_implicit=0.60 m/s
      enable_curvature_horizon_adapt: true
      horizon_kappa_scale: 0.5   # 压缩强度
      horizon_min_length: 0.75   # horizon 下限 (米)，对应最低速度 = 0.75/1.5 = 0.5 m/s
      use_omega_ref_from_path: false  # 关闭 dtheta/dt 角速度参考，抑制离散路径尖峰
      goal_decel_start_dist: 2.5  # 距终点开始减速距离 (m)
      goal_crawl_speed: 0.15      # 终点前最小爬行速度 (m/s)
      enable_goal_speed_guard: true      # 近终点速度安全包络（防止突然加速）
      goal_speed_guard_dist_scale: 1.5   # 包络生效距离倍率
      goal_speed_guard_decel_scale: 1.5  # 安全刹车减速度倍率
      goal_speed_guard_abs_floor: 0.6    # 安全刹车最小减速度 (m/s^2)
      pivot_turn_heading_thresh: 1.0  # 航向误差>该值时原地转向 (rad)
      heading_slowdown_start: 0.500       # 航向误差>该值开始降速 (rad)
      heading_slowdown_min_factor: 0.3  # 航向降速最小倍率
      enable_curvature_speed_decay: true  # 高曲率路段启用参考速度衰减
      curvature_decay_kappa_ref: 5.0      # 曲率参考值(1/m)，越小衰减越明显
      curvature_decay_min_factor: 0.9    # 曲率衰减最小倍率
      odom_feedback_alpha: 0.0   # 速度反馈融合系数: 0=纯上次指令, 1=纯里程计
      # 一阶滞后时间常数：tau = 底层 LQR 速度闭环的等效时间常数
      vel_lag_tau: 0.5           # 线速度一阶滞后时间常数(s)
      omega_lag_tau: 0.15        # 角速度一阶滞后时间常数(s)
      lateral_error_threshold: 0.1  # 横向误差阈值 (m)，超过时启用速度缩减策略

      # === 代价权重（运行时生效） ===
      Q_position: 20.0           # 位置(x,y)跟踪权重
      Q_orientation: 8.0         # 航向角(theta)跟踪权重
      Q_velocity: 5.0            # 线速度跟踪权重
      Q_omega: 5.0               # 角速度跟踪权重（原硬编码 5.0，现为可调参数）
      R_linear: 0.02             # 线加速度平滑权重
      R_angular: 0.01            # 角加速度平滑权重
      contouring_weight: 10.0   # 路径横向偏离(contouring)权重


      # === ESDF/轮廓代价（运行时生效） ===
      esdf_weight: 1e-3         # ESDF 违反代价权重
      esdf_safe_dist: 0.8        # ESDF 安全距离阈值(m)

      # === 权重缩放/ESDF开关（运行时生效） ===
      terminal_multiplier: 2.0   # 终端代价
      enable_esdf_cost: false      # 启用 ESDF 障碍物代价
      near_weight_multiplier: 2.0  # 近端权重倍增，强化近距离避障
      
      # === 可视化选项 ===
      publish_predicted_path: true   # 发布 NMPC 预测轨迹 (/nmpc/predicted_path)
    
    
    # 恢复行为
    recovery:
      backup_dist: 0.3
      backup_vel: -0.2
      spin_angle: 3.14
      spin_vel: 0.5
    
    # 脱困系统 (ESCAPING 状态)
    escape:
      # 触发条件
      trigger_costmap_threshold: 99   # Costmap 触发阈值，起点 cost >= 此值时触发脱困
      target_safe_esdf: 0.3           # 目标 ESDF 距离 (m)，搜索大于此值的安全点
      
      # 搜索参数
      search_radius: 1.0              # BFS 最大搜索半径 (m)
      
      # 控制参数
      rotation_speed: 1.0             # 旋转角速度 (rad/s)
      forward_speed: 0.5             # 前进线速度 (m/s)
      yaw_tolerance: 0.1              # 角度对齐容差 (rad, ~6度)
      position_tolerance: 0.1        # 到达位置容差 (m)
      
      # 超时保护
      timeout: 10.0                   # 脱困最大时长 (秒)，超时进入 RECOVERY

two_point_patrol:
  ros__parameters:
    goal_topic: "goal_pose"                 # RViz 2D Goal 默认话题
    navigate_action_name: "navigate"        # nav_server action 名称
    goal_frame: "map"
    check_period_s: 0.1
    near_goal_distance_m: 0.45               # 距目标小于该值即视为“到达附近”
    switch_delay_s: 0.8                      # 到达附近后延时切换到另一个目标
    save_file: "/tmp/nav_two_goal_points.txt"
    auto_start: false                        # true: 读取到2点后自动开始循环
