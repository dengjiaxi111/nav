# 导航参数配置

nav_server:
  ros__parameters:
    # map_file 由 launch 文件设置
    control_rate: 50.0
    map_update_rate: 20.0  # 地图更新频率(Hz)
    goal_timeout: 60.0
    goal_tolerance: 0.1
    yaw_tolerance: 0.1
    
    # 坐标系配置
    map_frame: "map"
    base_frame: "base_link"
    odom_frame: "odom"
    
    # 控制器超时保护
    controller_timeout: 10.0  # 控制器无进展超时(秒)
    controller_progress_threshold: 0.15  # 进展检测距离阈值(米)
    
    # 周期性路径检查 (动态障碍物应对，默认启用)
    path_check_period: 0.1  # 路径检查周期(秒) - 降低以快速响应动态障碍物
    path_lateral_tolerance: 0.5  # 横向偏离路径容忍度(米)，超过则重规划
    # 说明: 系统每隔 path_check_period 秒检查机器人到路径的最短距离
    # 如果横向偏离超过 path_lateral_tolerance，会停止并重新规划
    # path_check_period 越小响应越快，但会增加 CPU 负载（建议 0.2-1.0 秒）
    
    # ============ 分层地图系统 ============
    # 静态层: 从yaml/pgm文件加载的全局地图
    enable_static_layer: false   # 启用静态层（默认启用）
    # 说明: 
    #   - 启用时: 从map_file加载pgm/yaml静态地图
    #   - 禁用时: 自动创建50x50m空白地图框架（纯动态SLAM模式）
    # 注意: 禁用静态层时，必须启用动态层，否则无障碍物信息
    
    # 动态层: 来自rog_map的局部障碍物
    enable_dynamic_layer: true  # 启用动态层融合
    dynamic_layer_topic: "/rog_map/map_2d"  # 局部障碍物地图话题 (odom坐标系)
    # 说明: 动态层会自动从odom坐标系投影到map坐标系，并与静态地图融合
    
    # ============ 地图更新性能日志 ============
    enable_performance_logging: false  # 启用地图更新性能日志 (开发/调试时启用)
    # 说明: 启用后会在控制台输出地图融合、ESDF/Costmap重建的详细耗时
    
    # ============ ESDF 地图 ============
    enable_esdf: true
    esdf_vis_max_dist: 2.0      # 可视化最大距离(m)
    
    # Costmap 膨胀
    inflation:
      radius: 0.8              # 膨胀半径(m)
      inscribed_radius: 0.15    # 内切圆半径(m)，致命代价区
      cost_scaling: 1.8        # 指数衰减因子
      decay_type: exponential  # linear 或 exponential
    
    # 规划器
    planner:
      obstacle_threshold: 100   # 障碍物阈值
      cost_weight: 1.5         # 代价权重 (越大越远离障碍物)
      enable_smooth: true      # 启用 B样条平滑
      resample_interval: 0.4   # 重采样间隔 (m)，控制曲线光滑度，越小越光滑
      smooth_resolution: 0.05  # 平滑后路径分辨率 (m)
      
      # 路径复用和剪枝 (新增)
      enable_path_cache: true         # 启用路径缓存和复用
      enable_auto_prune: true         # 启用自动剪枝已驶过部分
      goal_tolerance: 0.2             # 目标变化阈值(米), 小于此值则认为目标未变化
      obstacle_check_threshold: 99    # 障碍物检查阈值, 路径上代价值 >= 此值视为障碍物
      # 说明: Costmap值范围: 0=自由, 1-98=膨胀区, 99=inscribed_radius内, 100=障碍物
      # 设为99表示只有真正危险的区域才会导致路径失效，膨胀区域允许通过
      prune_distance: 0.5             # 剪枝保留距离(米), 保留当前位置前方此距离内的点
      
      # B样条优化（基于 Fast-Planner）
      enable_optimization: true    # 启用轨迹优化
      opt_lambda_smooth: 5.0      # 平滑项权重（弹性带）
      opt_lambda_collision: 10.0    # 障碍物项权重（ESDF 排斥）- 增大以远离墙壁
      opt_safe_dist: 0.8           # 安全距离阈值 (m)
      opt_max_iter: 50             # 最大迭代次数
      opt_curvature_adaptive: true # 曲率自适应（转角处更远离障碍物）
      opt_curvature_weight: 4.0    # 曲率加权系数 - 增大以在弯道处更远离墙壁
      
      # 窄通道中心线吸引（进出窄通道时走中间）
      narrow_passage_align: true   # 启用窄通道中心吸引
      narrow_passage_thresh: 0.7   # 窄通道判定阈值 (m)，ESDF距离小于此值的区域
      opt_lambda_align: 10.0       # 中心吸引权重 (降低，防止穿墙)
      align_entry_points: 3        # 入口/出口各优化几个点 (1-3)
      narrow_min_consecutive: 3    # 最少连续几个点才算窄通道（防止单点误判）
    
    
    # 控制器(Pure Pursuit)
    controller:
      lookahead_dist: 0.5
      max_linear_vel: 0.5
      max_angular_vel: 1.0
    
    # NMPC 控制器 (非线性模型预测控制)
    nmpc:
      # === 运动约束 (物理限制) ===
      max_linear_vel: 2.0       # 最大线速度 (m/s)
      max_angular_vel: 2.5      # 最大角速度 (rad/s)
      max_linear_accel: 3.0     # 最大线加速度 (m/s²) - 提高以增强敏捷性
      max_angular_accel: 4.0    # 最大角加速度 (rad/s²) - 提高以快速转弯
      allow_reverse: false      # 禁止倒车
      
      # === 局部参考轨迹提取 ===
      horizon_length: 5.0       # 前向提取距离 (米) - 应匹配预测时域
      desired_velocity: 1.5     # 期望跟踪速度 (m/s) - 提高以更快行进
      
      # === 代价函数权重 (越大越重视) ===
      Q_position: 20.0          # 位置 (x,y) 跟踪权重
      Q_orientation: 15.0        # 航向角 (theta) 跟踪权重
      Q_velocity: 5.0           # 速度 (v,omega) 跟踪权重 - 提高以更快达到期望速度
      R_linear: 0.1             # 线加速度平滑性权重 - 降低以允许更激进的加减速
      R_angular: 0.15            # 角加速度平滑性权重 - 降低以允许更快转向
      terminal_multiplier: 5.0  # 终端代价倍数 (最后一步加权)
      
      # === 容差参数 ===
      xy_tolerance: 0.15        # 位置到达容差 (米) - 增大以减少过冲
      yaw_tolerance: 0.15       # 航向到达容差 (弧度) - 增大以减少旋转过冲
      
      # === 可视化选项 ===
      publish_predicted_path: true   # 发布 NMPC 预测轨迹 (/nmpc_predicted_path)
      publish_debug_markers: false   # 发布调试标记 (减少通信负载)
      
      # === 求解器参数 (高级选项) ===
      # 注意: N_horizon 和 T_horizon 在编译时固定 (model_ocp/export_ocp.py)
      # 当前设置: N=20, T=2.0s, dt=0.1s
      # 建议重新导出求解器时增加预测时域: T=3.0s 或 N=30
      qp_solver_max_iter: 50    # QP 子问题最大迭代次数
      levenberg_marquardt: 1e-4 # 数值稳定性阻尼因子
    
    
    # 恢复行为
    recovery:
      backup_dist: 0.3
      backup_vel: -0.2
      spin_angle: 3.14
      spin_vel: 0.5
