# 导航参数配置

nav_server:
  ros__parameters:
    # 静态重定位开关 (true: 从RViz的"2D Pose Estimate"接收初始位姿并作为固定的map->odom; false: 实际场地使用NDT重定位)
    use_static_map_odom: false
    # 调试开关：重定位或给初始位姿后强制 odom==base_link（仅用于路径规划调试）
    debug_reset_odom_to_base_link: false
    
    # 地图路径由 navigation.launch.py 注入
    map_file: "/home/nuc/navigation2026/src/my_navigation/nav_bringup/maps/map3.pgm"
    control_rate: 50.0
    goal_timeout: 1000.0    # 总任务超时(s)，从收到目标开始超过该时间仍未完成则触发 TIMEOUT recovery
    goal_tolerance: 0.1
    yaw_tolerance: 0.1
    
    # 坐标系配置
    map_frame: "map"
    base_frame: "base_link_fake"
    odom_frame: "odom"
    
    # 控制器超时保护
    controller_timeout: 3.5  # 控制器无进展超时(s)，超过该时间无有效位移则触发 CONTROL_FAILED recovery
    controller_progress_threshold: 0.2  # 控制器有效进展距离阈值(m)，移动超过该距离才刷新进展时间
    
    # 周期性路径检查 (动态障碍物应对，默认启用)
    path_check_period: 0.1 # 路径检查周期(秒) - 降低以快速响应动态障碍物
    path_lateral_tolerance: 1.25  # 横向偏离路径容忍度(米)，超过则重规划
    # 说明: 系统每隔 path_check_period 秒检查机器人到路径的最短距离
    # 如果横向偏离超过 path_lateral_tolerance，会停止并重新规划
    # path_check_period 越小响应越快，但会增加 CPU 负载（建议 0.2-1.0 秒）

    # ============ 路径持久化/复用 ============
    path_io:
      enable_save_planned_path: false   # true: 每次规划成功后保存平滑路径
      planned_path_file: "/tmp/nav_planned_path.yaml"
      use_prior_path: false            # true: 规划阶段优先读取先验路径并直接送入控制器
      prior_path_file: "/tmp/nav_planned_path.yaml"
      validate_prior_path: false        # 读取后先做障碍物校验
      fallback_to_planner: false        # 先验路径不可用时回退到在线规划
    
    # ============ 分层地图系统 ============
    # 静态层: 从yaml/pgm文件加载的全局地图
    enable_static_layer: true   # 启用静态层（默认启用）
    # 说明: 
    #   - 启用时: 从map_file加载pgm/yaml静态地图
    #   - 禁用时: 自动创建50x50m空白地图框架（纯动态SLAM模式）
    # 注意: 禁用静态层时，必须启用动态层，否则无障碍物信息
    
    # 动态层: 来自rog_map的局部障碍物
    enable_dynamic_layer: true    # 启用动态层融合
    dynamic_layer_topic: "/rog_map/map_2d"  # 局部障碍物地图话题 (odom坐标系)
    # 说明: 动态层会自动从odom坐标系投影到map坐标系，并与静态地图融合

    # ============ 特殊地形层（stair layer）============
    special_terrain:
      enable_stair_layer: false
      # stair_mask_yaml: "/home/nuc/navigation2026/src/my_navigation/nav_bringup/maps/stair.yaml"   # 由 navigation.launch.py 注入
      stair_clear_perp_dist_m: 0.35 # 台阶边沿清理距离(米)，清除台阶边沿一定宽度内的障碍物标记，防止过于靠近边沿导致误判无法通过
      stair_clear_perp_high_dist_m: 0.33  # 高侧法向扩展清除距离(米), <0 表示回退到 stair_clear_perp_dist_m
      stair_clear_perp_low_dist_m: 0.36   # 低侧反法向扩展清除距离(米), <0 表示回退到 stair_clear_perp_dist_m
      # 双向台阶像素范围（高侧=black，低侧=gray）除距离(米), <0 表示回退到 stair_clear_perp_dist_m
      # 双向台阶像素范围（高侧=black，低侧=gray）
      black_min: 1
      black_max: 20
      gray_min: 100
      gray_max: 140
      # 二级台阶像素范围（高侧=black，低侧=gray），清除逻辑复用双向台阶
      stair_level2_clear_perp_dist_m: 0.35 # 二级台阶边沿清理距离(米)
      stair_level2_clear_perp_high_dist_m: 1.5 # 二级台阶高侧法向扩展清除距离(米)
      stair_level2_clear_perp_low_dist_m: 0.35 # 二级台阶低侧反法向扩展清除距离(米)
      stair_level2_black_min: 71
      stair_level2_black_max: 90
      stair_level2_gray_min: 221
      stair_level2_gray_max: 254
      pair_search_radius_cells: 4
      # 单向台阶（仅允许高->低，禁止低->高）
      enable_oneway_stair_down: true
      oneway_black_min: 21
      oneway_black_max: 50
      oneway_gray_min: 141
      oneway_gray_max: 190

      # 飞坡层（低侧线/高侧线）
      enable_fly_slope_layer: false
      fly_slope_mask_yaml: "/home/nuc/navigation2026/map/stair_test.yaml"  # 默认可与台阶mask共图，不同像素段区分
      fly_slope_clear_perp_dist_m: 0.45
      fly_slope_clear_perp_high_dist_m: 0.45
      fly_slope_clear_perp_low_dist_m: 0.45
      # 飞坡双线像素范围：low 侧与 high 侧
      fly_slope_low_min: 51
      fly_slope_low_max: 70
      fly_slope_high_min: 191
      fly_slope_high_max: 220
      fly_slope_pair_search_radius_cells: 4
      # 仅允许低侧 -> 高侧，禁止高侧 -> 低侧
      fly_slope_enable_oneway_low_to_high: true

    # === 台阶语义调试可视化 ===
      publish_stair_debug_markers: false
      debug_marker_max_segments: 1500

      # === 台阶动作状态机（阶段B，不含冷却） ===
      # 总开关：false 时退化为旧逻辑（仅 stair_mode 检测/透传）
      enable_stair_fsm: false
      enable_stair_level2_down_fsm: false  # 下二级台阶状态机开关；false 时高侧->低侧禁行，规划绕路；true 时发布 stair_mode=4

    # [兼容输出] stair_mode: 0=正常, 1=一级台阶, 2=飞坡, 3=上二级台阶, 4=下二级台阶
      enable_stair_mode_detection: false
      enable_fly_slope_mode_detection: false

    # [候选检测窗口] 何时识别“即将上台阶”
      stair_mode_trigger_distance_m: 2.00
      stair_mode_lookahead_dist_m: 2.0
      stair_mode_sample_step_m: 0.05
      stair_mode_entry_heading_error_max_rad: 1.0  # 进入预对准/提交前航向阈值(|path_heading - yaw|)

    # [输出保持与保护] 兼容原 stair_mode 抖动抑制/安全释放
      stair_mode_release_grace_cycles: 2
      stair_mode_min_hold_sec: 0.5  # 抬腿信号最小保持时间(秒)，用于抑制 1->0 瞬时抖动
      stair_mode_force_release_distance_m: 2.6  # mode=1 时若检测到台阶距离过远(或无 upcoming)，强制回0
      stair_mode_max_assert_sec: 8.0   # mode=1 最大持续时间(秒)，超时强制回0，便于下次上升沿再次触发
      stair_mode_omega_limit_rad_s: 100.0  # stair_mode=1 时角速度上限 |omega| (rad/s)
      stair_mode_omega_slew_rate_rad_s2: 50.0  # stair_mode=1 时角速度斜坡限幅 (rad/s^2)

      # [状态转移阈值] PRE_ALIGN -> COMMIT / COMMIT -> VERIFY / VERIFY 超时
      stair_contact_distance_m: 1.60              # 接触判定阈值(米)
      stair_commit_success_dist_m: 0.10          # 越过台阶中心线后的成功法向距离阈值(米)
      stair_level2_commit_success_dist_m: 0.50  # 二级台阶：越过台阶中心线后的成功法向距离阈值(米)
      stair_verify_timeout_sec: 2.0              # VERIFY_SUCCESS 超时(秒)

      # [失败判据] A + B(弧长进展超时)
      leg_length_topic: "LegLength"              # 腿长反馈话题，来自 myserial
      leg_length_timeout_sec: 0.50               # 抬腿命令发出后，允许腿长达到阈值的最长时间
      leg_length_stale_timeout_sec: 0.20         # 腿长反馈超过该时间未更新时，按“已满足”处理
      stair_leg_ready_threshold_m: 0.25        # 一级台阶抬腿到位阈值
      stair_level2_leg_ready_threshold_m: 0.15   # 二级台阶抬腿到位阈值
      fly_slope_leg_ready_threshold_m: 0.16      # 飞坡抬腿到位阈值
      stair_fail_a_precontact_miss_cycles: 3     # 兼容旧参数，当前判据A已改为腿长超时
      stair_progress_timeout_sec: 2.5            # COMMIT_ASCENT 进展超时(秒)
      stair_progress_min_arc_m: 0.20             # 进展判据B所需最小弧长增量(米)

      # [提交段控制] COMMIT_ASCENT
      enable_stair_fixed_velocity_strategy: true
      stair_raise_leg_distance_m: 1.0           # COMMIT_ASCENT阶段内，距台阶小于此值时下发 stair_mode=1 抬腿
      stair_fixed_velocity_trigger_distance_m: 1.0 # COMMIT_ASCENT阶段内，距台阶小于此值时真正生效设定的慢速
      stair_fixed_linear_vel: 1.1          # COMMIT_ASCENT阶段内的固定线速度(m/s)，需要配合上方 trigger_distance_m 适当调大以保证平滑过渡
      stair_level2_raise_leg_distance_m: 0.65   # 二级台阶：COMMIT_ASCENT阶段内，距台阶小于此值时下发 stair_mode=3/4 抬腿
      stair_level2_fixed_velocity_trigger_distance_m: 0.60 # 二级台阶：COMMIT_ASCENT阶段内，距台阶小于此值时启用固定速度
      stair_level2_fixed_linear_vel: 0.5        # 二级台阶：固定速度线速度(m/s)
      stair_fixed_heading_kp: 5.0           # 固定速度航向控制增益，增大更紧贴台阶边沿，但过大会导致震荡
      stair_fixed_max_angular_vel: 100.0
      stair_fixed_heading_deadband: 0.05    # 固定速度航向死区(rad)，小于此值不进行航向调整，防止过近时的过度修正和震荡

      # [失败退让与重试] FAIL_RETRY_BACKOFF
      stair_backoff_distance_m: 2.5           # 失败后沿法向退让距离(米)
      stair_backoff_tangent_search_half_width_m: 0.30  # 中垂线局部搜索半宽(米)
      stair_backoff_linear_vel: 1.0             # 退让线速度(米/秒)
      stair_backoff_heading_kp: 2.0              # 退让航向控制增益
      stair_backoff_max_angular_vel: 3.5         # 退让角速度上限(rad/s)
      stair_backoff_pos_tolerance_m: 0.08        # 退让完成判定容差(米)
      backoff_release_distance_m: 0.35           # 退让初段先沿远离地形方向释放接触的距离(米)，完成后再按航向误差退让
      backoff_release_linear_vel: 1.5           # 释放接触阶段线速度绝对值；会按车头/车尾方向自动选择前进或倒车
      backoff_release_max_angular_vel: 3.5        # 释放接触阶段角速度上限，避免贴住台阶时大角速度原地拧车
      backoff_release_heading_kp: 0.8            # 释放接触阶段航向弱修正增益
      backoff_total_timeout_sec: 8.0             # FAIL_RETRY_BACKOFF 总超时，超时请求 recovery
      backoff_nav_progress_timeout_sec: 10.0      # 特殊地形退让阶段使用的导航控制无进展超时，避免普通控制超时过早 recovery
      stair_retry_max_attempts: 3                # 单次任务最大重试次数（阶段B）
      stair_request_recovery_on_max_attempts: true  # 超过最大重试后请求恢复，否则请求重规划

      # [阶段C] 同台阶失败统计与冷却（按 stair_id）
      enable_stair_cooldown: true
      stair_cooldown_fail_threshold: 10          # 同一 stair_id 连续失败达到阈值进入冷却
      stair_cooldown_duration_sec: 120.0          # 冷却时长(秒)，期间触发 REQUEST_REPLAN


      # [飞坡动作状态机参数]（与台阶独立，初值对齐台阶）
      # [候选检测窗口] 何时识别“即将上台阶”
      fly_slope_mode_trigger_distance_m: 2.75         # PRE_ALIGN 触发窗口：候选地形距离小于该值进入预对准
      fly_slope_mode_lookahead_dist_m: 4.4             # 前向沿路径扫描飞坡候选的最大距离(米)
      fly_slope_mode_sample_step_m: 0.05               # 候选扫描采样步长(米)，越小检测越细.
      fly_slope_mode_entry_heading_error_max_rad: 0.05  # PRE_ALIGN -> COMMIT 的航向误差阈值(rad)

      # [输出保持与保护] 兼容原 stair_mode 抖动抑制/安全释放
      fly_slope_mode_release_grace_cycles: 2           # mode=2 释放保护周期数（抑制短时抖动）
      fly_slope_mode_min_hold_sec: 0.3                 # mode=2 最小保持时长(秒)
      fly_slope_mode_force_release_distance_m: 3.0    # mode=2 强制释放距离阈值(米)，超出则回0
      fly_slope_mode_max_assert_sec: 8.0               # mode=2 最大持续时长(秒)，超时强制回0
      fly_slope_mode_omega_limit_rad_s: 100.0          # mode=2 角速度绝对值限幅(rad/s)
      fly_slope_mode_omega_slew_rate_rad_s2: 50.0      # mode=2 角速度斜率限幅(rad/s^2)

      # [状态转移阈值] PRE_ALIGN -> COMMIT / COMMIT -> VERIFY / VERIFY 超时
      fly_slope_pre_align_lateral_error_max_m: 0.06    # PRE_ALIGN 对齐监控阈值(米)，飞坡 COMMIT 不再以此作为硬门槛
      fly_slope_pre_align_return_max_linear_vel: 0.50  # PRE_ALIGN 飞坡垂直段跟踪线速度上限(m/s)
      fly_slope_pre_align_return_max_angular_vel: 1.8  # PRE_ALIGN 飞坡垂直段跟踪角速度上限(rad/s)
      enable_fly_slope_pre_align_turn_in_place: true   # PRE_ALIGN 中若航向误差过大，先原地粗对齐
      fly_slope_pre_align_heading_kp: 4.0              # PRE_ALIGN 飞坡垂直段航向对齐角速度增益
      fly_slope_pre_align_lateral_kp: 1.0              # PRE_ALIGN 飞坡垂直段有符号横向误差修正增益
      fly_slope_pre_align_turn_in_place_error_rad: 0.6 # PRE_ALIGN 触发原地粗对齐的航向误差阈值(rad)
      fly_slope_pre_align_max_angular_vel: 2.4         # PRE_ALIGN 原地对齐角速度上限(rad/s)
      fly_slope_contact_distance_m: 2.0              # PRE_ALIGN -> COMMIT 的接触距离阈值(米)
      fly_slope_commit_success_dist_m: 0.72           # COMMIT/VERIFY 成功判定法向距离阈值(米)
      fly_slope_verify_timeout_sec: 1.2                # VERIFY_SUCCESS 最大等待时长(秒)

      # [失败判据] A + B(弧长进展超时)
      fly_slope_fail_a_precontact_miss_cycles: 3       # 判据A：接触前短腿连续失败周期阈值
      fly_slope_progress_timeout_sec: 2.5              # 判据B：COMMIT 弧长进展超时(秒)
      fly_slope_progress_min_arc_m: 0.3              # 判据B：最小弧长进展阈值(米)

      # [提交段控制] COMMIT_ASCENT
      enable_fly_slope_fixed_velocity_strategy: true   # COMMIT 段启用固定速度策略
      fly_slope_raise_leg_distance_m: 1.5           # COMMIT 内触发 mode=2（抬腿）距离阈值(米)
      fly_slope_fixed_velocity_trigger_distance_m: 1.5 # COMMIT 内固定速度真正生效距离阈值(米)
      fly_slope_fixed_linear_vel: 2.0                 # COMMIT 固定线速度(m/s)
      fly_slope_fixed_heading_kp: 3.0                  # COMMIT 航向控制增益
      fly_slope_fixed_max_angular_vel: 100.0           # COMMIT 角速度上限(rad/s)
      fly_slope_fixed_heading_deadband: 0.05           # COMMIT 航向死区(rad)

      # [失败退让与重试] FAIL_RETRY_BACKOFF
      fly_slope_backoff_distance_m: 2.5                # FAIL_RETRY_BACKOFF 法向退让距离(米)
      fly_slope_backoff_tangent_search_half_width_m: 0.30  # FAIL_RETRY_BACKOFF 切向局部搜索半宽(米)
      fly_slope_backoff_linear_vel: 1.3                # FAIL_RETRY_BACKOFF 退让线速度(m/s)
      fly_slope_backoff_heading_kp: 2.0                # FAIL_RETRY_BACKOFF 航向控制增益
      fly_slope_backoff_max_angular_vel: 6.0           # FAIL_RETRY_BACKOFF 角速度上限(rad/s)
      fly_slope_backoff_pos_tolerance_m: 0.08          # FAIL_RETRY_BACKOFF 到位判定容差(米)
      fly_slope_retry_max_attempts: 3                  # 单次任务最大重试次数
      fly_slope_request_recovery_on_max_attempts: true # 超过重试次数后请求恢复（否则请求重规划）
      enable_fly_slope_cooldown: true                  # 启用同飞坡对象失败冷却
      fly_slope_cooldown_fail_threshold: 10             # 连续失败达到阈值进入冷却
      fly_slope_cooldown_duration_sec: 10.0          # 冷却时长(秒)，冷却期内触发 REQUEST_REPLAN
    
    # ============ 地图更新性能日志 ============
    enable_performance_logging: false  # 启用地图更新性能日志 (开发/调试时启用)
    # 说明: 启用后会在控制台输出地图融合、ESDF/Costmap重建的详细耗时
    
    # ============ ESDF 地图 ============
    enable_esdf: true
    esdf_vis_max_dist: 2.0      # 可视化最大距离(m)
    
    # Costmap 膨胀
    inflation:
      radius: 0.8              # 膨胀半径(m)
      inscribed_radius: 0.2    # 内切圆半径(m)，致命代价区
      cost_scaling: 1.8        # 指数衰减因子
      decay_type: exponential  # linear 或 exponential
    
    # 规划器
    planner:
      obstacle_threshold: 99   # 障碍物阈值
      cost_weight: 0.9         # 代价权重 (降低后更愿意通过窄通道)
      enable_smooth: true      # 启用 B样条平滑
      resample_interval: 0.3   # 重采样间隔 (m)，控制曲线光滑度，越小越光滑
      smooth_resolution: 0.05  # 平滑后路径分辨率 (m)
      
      # 路径复用和剪枝
      enable_path_cache: true         # 启用路径缓存和复用
      enable_auto_prune: true         # 启用自动剪枝已驶过部分
      goal_change_tolerance: 0.2      # 目标变化阈值(米), 小于此值则认为目标未变化
      obstacle_check_threshold: 99    # 障碍物检查阈值, 路径上代价值 >= 此值视为障碍物
      esdf_warn_min_safe_dist: 0.12   # 平滑后ESDF预警最小安全距离(米)
      start_deviation_threshold: 1.0  # 起点偏离缓存路径阈值(米), 超过则强制重规划
      astar_max_attempts: 1           # A* 尝试次数（避免无效重试）
      astar_max_iterations: 3000000   # A* 单次搜索最大迭代次数(<=0 自动)，复杂长路径可适当调大
      astar_threshold_step: 0         # 关闭反向收紧阈值重试
      prune_distance: 1.0            # 剪枝保留距离(米), 保留当前位置前方此距离内的点
      publish_astar_raw_path: true   # 发布原始A*路径到 /plan_astar_raw（平滑前）
      allow_raw_fallback_on_smooth_fail: false  # 平滑后验证失败时是否回退原始A*（建议关闭）
      stair_constraint_mode: "hard"  # 台阶约束模式: "soft"=现有软约束A*; "hard"=强制经过台阶 pre/post 垂直点
      stair_hard_dist_delta_m: 0.2   # 仅 hard 模式生效: pre/post 距离相对 stair_align_*_pre/post_dist_m 的统一偏移量(米)
                # 例如 -0.1 且 stair_align_up_pre_dist_m=1.0 时，硬约束 pre 点距离变为 0.9m
      # 飞坡硬约束（与台阶 hard 同级）
      # - soft: 仅使用 A* fly_slope 形态代价（软约束）
      # - hard: 强制经过飞坡中心法向 pre/post 约束点（结构性约束）
      fly_slope_constraint_mode: "hard"  # 飞坡约束模式
      fly_slope_hard_dist_delta_m: 0.1    # 仅 hard 生效: 对下方飞坡 pre/post 窗口距离的统一偏移量(米)
      # 飞坡 pre/post 窗口弧长；同时用于 A* hard 约束和 B-spline 飞坡对齐
      astar_fly_slope_up_pre_dist_m: 2.5
      astar_fly_slope_up_post_dist_m: 0.5
      astar_fly_slope_down_pre_dist_m: 0.01
      astar_fly_slope_down_post_dist_m: 0.01
      hard_constraint_compare_log_once: false  # 开启后每次plan请求最多打印一次：旧三段估计 vs 新分段A*估计
      publish_failure_debug_markers: false  # 发布规划失败点到 /debug/planner_failures
      failure_marker_scale: 0.2          # 失败点球体尺寸(米)
      
      # B样条优化）
      enable_optimization: true    # 启用轨迹优化
      opt_lambda_smooth: 10.0      # 平滑项权重（弹性带）
      opt_lambda_collision: 20.0    # 障碍物项权重（ESDF 排斥）- 增大以远离墙壁
      opt_safe_dist: 0.5           # 安全距离阈值 (m)，降低以提高窄通道可行性
      opt_max_iter: 100             # 最大迭代次数
      opt_curvature_adaptive: true # 曲率自适应（转角处更远离障碍物）
      opt_curvature_weight: 4.0    # 曲率加权系数 - 增大以在弯道处更远离墙壁
      
      # 窄通道中心线吸引（进出窄通道时走中间）
      narrow_passage_align: true   # 启用窄通道中心吸引
      narrow_passage_thresh: 0.4   # 窄通道判定阈值 (m)，ESDF距离小于此值的区域
      opt_lambda_align: 10.0       # 中心吸引权重 (降低，防止穿墙)
      align_entry_points: 3        # 入口/出口各优化几个点 (1-3)
      narrow_min_consecutive: 3    # 最少连续几个点才算窄通道（防止单点误判）

      # 台阶段方向约束（经过台阶时尽量垂直边沿）
      stair_segment_align: true
      stair_segment_align_mode: "curve_sample"  # "control_point"(旧控制点级) / "curve_sample"(新曲线采样级)
      opt_lambda_stair_align: 25.0
      stair_sample_ds_m: 0.09  # 曲线采样间距(米)，仅 curve_sample 模式生效
      # Phase C: 锚点与走廊约束
      opt_lambda_stair_anchor: 2.0    # 锚点约束权重 (P_pre/P_mid/P_post)
      opt_lambda_stair_lateral: 3.0   # 横向走廊约束权重 (Huber loss)
      stair_corridor_half_width_m: 0.10  # 走廊半宽(米)，抑制沿台阶边沿滑行
      # B-spline 锚点对齐到 A* 台阶命中点（减少横向偏移）
      use_astar_stair_anchors: true
      astar_stair_anchor_match_max_dist_m: 0.15
      # 命中点近障碍时，沿台阶切向向低代价侧偏移
      astar_anchor_near_obstacle_dist_m: 0.10  # 触发阈值：命中点ESDF小于该值时，启动切向避障偏移
      astar_anchor_tangent_probe_dist_m: 0.05  # 探测距离：沿台阶切向正负两侧各探测该距离，选择更低代价侧
      astar_anchor_tangent_shift_step_m: 0.05 # 单步偏移：每次沿选中切向移动的步长(米)
      astar_anchor_tangent_shift_max_m: 0.30 # 最大偏移：单个命中点沿切向允许累计偏移的上限(米)
      astar_anchor_tangent_improve_min_m: 0.005  # 最小改善量：新位置ESDF需至少提升该值才接受本次偏移
      # 推荐：按弧长定义窗口，并区分上/下台阶
      stair_align_up_pre_dist_m: 1.90
      stair_align_up_post_dist_m: 0.5
      stair_align_down_pre_dist_m: 0.15
      stair_align_down_post_dist_m: 0.01
    
    # NMPC 控制器
    nmpc:
      # 注意: N_horizon/T_horizon、QP/LM 等仍由 acados 生成 solver 固化
      # 下方 Q/R/ESDF/contouring 参数已接入运行时注入，修改 YAML 可直接生效
      # === 运动约束 ===
      max_linear_vel: 2.0        # 最大线速度 (m/s) 
      max_state_linear_vel: 2.9  # NMPC真实速度状态上限，允许底盘短时超调
      min_state_linear_vel: -0.3 # NMPC真实速度状态下限，允许轮速小幅负向抖动
      max_angular_vel: 10.0      # 最大角速度 (rad/s)
      max_linear_accel: 6.0      # 最大线加速度 (m/s²)
      max_linear_decel: 4.0     # 最大线减速度 (m/s²)
      max_angular_accel: 10.0     # 最大角加速度 (rad/s²) 
      allow_reverse: false       # 倒车
      capacitor_limit:
        v_safe: 0.0             # 电容健康电压；高于该值不缩放加速度
        v_low: 0.0              # 明显保护电压；低于该值使用低电压固定倍率
        protect_scale: 1.0       # V_low <= V < V_safe 时的加速度倍率
        low_scale: 1.0           # V < V_low 时的加速度倍率
        filter_alpha: 1.0        # 电压低通系数，1.0表示完全使用最新电压
      
      # === 局部参考轨迹提取 ===
      # horizon_length 与 desired_velocity 共同决定参考轨迹的运动学一致性：
      #   直道下：v_ref_implicit = horizon_length / T_horizon = desired_velocity
      #   故推荐 horizon_length = desired_velocity * T_horizon_solver (= 2.0 * 1.5 = 3.0m)
      # 速度一致性补丁（代码中已实施）：desired_v = min(desired_v, step_dist/dt)，
      #   确保速度参考不超过位置间距隐含的速度上限，消除代价函数内耗
      horizon_length: 3.00     # 直道参考弧长 (米)，= desired_velocity * T_horizon_solver
      desired_velocity: 2.00      # 期望巡航速度 (m/s)
      speed_profile:
        enable: true
        v_cruise: 2.0              # 解耦后的巡航参考速度 (m/s)
        v_min: 0.30                # 非终点工况最低参考速度 (m/s)
        max_lateral_accel: 1.5   # 横向加速度上限，用于曲率限速 (m/s^2)
        kappa_epsilon: 0.08        # 曲率分母下限，防止小曲率时限速发散 (1/m)
        curvature_window_m: 1.5   # 曲率统计窗口长度 (m)

      # 曲率自适应 horizon：effective_horizon = horizon_length / (1 + kappa_scale * kappa_max)
      # 同时自动压缩位置间距和速度参考上限（运动学一致），一致降低弯道速度
      # 典型效果（kappa_scale=0.5, horizon=3.0m）：
      #   κ=0/m (直道): horizon=3.0m → v_implicit=2.00 m/s
      #   κ=1/m       : horizon=2.00m → v_implicit=1.33 m/s
      #   κ=2/m       : horizon=1.50m → v_implicit=1.00 m/s
      #   κ=3/m       : horizon=1.20m → v_implicit=0.80 m/s
      enable_curvature_horizon_adapt: false  # 启用曲率自适应 horizon
      horizon_kappa_scale: 0.05   # 压缩强度
      horizon_min_length: 1.6   # horizon 下限 (米)，对应最低速度 = 0.75/1.5 = 0.5 m/s
      use_omega_ref_from_path: false  # 关闭 dtheta/dt 角速度参考，抑制离散路径尖峰
      goal_crawl_speed: 0.15      # 终点前最小爬行速度 (m/s)
      enable_goal_speed_limit: false # 是否启用沿路径剩余距离的终点限速
      goal_slowdown_dist: 0.70    # 沿路径剩余距离小于该值时启用终点限速(m)
      goal_min_moving_speed: 0.12 # 终点减速区内最小可动速度(m/s)，需大于底盘死区
      goal_max_slow_speed: 0.3  # 刚进入终点减速区时的速度上限(m/s)
      pivot_turn_heading_thresh: 1.20  # 航向误差>该值时原地转向 (rad)
      pivot_turn_startup_only: false  # true=仅新路径起步阶段生效, false=控制过程中任意时刻生效
      startup_align:
        enable: true             # 新路径/重规划起步阶段启用硬对准门控
        enter_thresh: 0.8       # 航向误差超过该值时进入硬对准(rad)，约26deg
        exit_thresh: 0.15        # 进入硬对准后误差小于该值才允许起步(rad)，约9deg
        lookahead: 0.40          # 用路径几何前视点计算起步目标航向(m)
        kp: 3.0                  # 原地对准角速度比例系数
        min_angular_vel: 0.25    # 原地对准最小角速度(rad/s)
        max_angular_vel: 3.5     # 原地对准最大角速度(rad/s)
      odom_feedback_alpha: 0.8   # 速度反馈融合系数: 0=纯模型预测, 1=纯实测速度；二阶模型测试先从0.2起步
      velocity_feedback_source: "chassis_odom" # chassis_odom=使用 /ChassisOdom.speed_x/speed_w, 其他值=回退 last_state
      chassis_velocity_topic: "/ChassisOdom"
      chassis_velocity_timeout_sec: 0.15
      chassis_velocity_filter_alpha: 1.0 # 1.0=不低通；若实测速度抖动可尝试 0.8/0.6
      publish_speed_observation: true  # 发布 /nmpc/speed_observation 观测流
      chassis_odom_topic: "/Odometry" # legacy 调试通道，nav_msgs/msg/Odometry，不参与新速度反馈
      # 二阶滞后参数：tau控制响应快慢，zeta控制过冲/回摆
      vel_lag_tau: 0.48 #0.25           # 线速度二阶滞后时间常数(s)
      omega_lag_tau: 0.09        # 角速度二阶滞后时间常数(s)
      vel_lag_zeta: 0.9          # 线速度阻尼比：先用1.0，模型偏稳后再按0.9/0.8/0.7试
      omega_lag_zeta: 1.0        # 角速度阻尼比：先用1.0，模型偏稳后再小步降低

      # === 代价权重（运行时生效） ===
      Q_position: 3.0           # 位置(x,y)跟踪权重
      Q_orientation: 8.0         # 航向角(theta)跟踪权重
      Q_velocity: 0.1           # 线速度跟踪权重
      Q_omega: 0.1             # 角速度跟踪权重（原硬编码 5.0，现为可调参数）
      R_linear: 0.01             # 线加速度平滑权重
      R_angular: 0.01            # 角加速度平滑权重
      contouring_weight: 25.0   # 路径横向偏离(contouring)权重


      # === ESDF/轮廓代价（运行时生效） ===
      esdf_weight: 70.0         # ESDF 违反代价权重
      esdf_safe_dist: 0.5        # ESDF 安全距离阈值(m)

      # === 权重缩放/ESDF开关（运行时生效） ===
      terminal_multiplier: 2.0   # 终端代价
      enable_esdf_cost: true      # 启用 ESDF 障碍物代价
      near_weight_multiplier: 3.0  # 近端权重倍增，强化近距离避障
      
      # === 可视化选项 ===
      publish_predicted_path: true   # 发布 NMPC 预测轨迹 (/nmpc/predicted_path)
    
    
    # 恢复行为
    recovery:
      # 有效恢复序列次数上限：同一导航任务中实际启动 recovery 序列达到该次数后直接 FAILED
      max_recovery: 3
      
      # 后退恢复：用于从局部卡住、控制失败等状态中先退开一点，再重新规划
      backup_dist: 0.5              # 后退目标距离(m)，达到该位移后认为后退动作完成
      backup_vel: -1.5              # 后退线速度(m/s)，应为负值；绝对值越大后退越快
      backup_timeout: 3.0           # 后退动作最大执行时间(s)，超时则该恢复动作失败
      
      # 恢复动作进展检测：防止底盘卡住后一直发送恢复速度
      min_progress: 0.15            # 后退恢复的最小有效位移(m)，超过该值才刷新进展时间
      progress_timeout: 3.0         # 后退时允许无有效进展的最长时间(s)，超过则判定失败
      
      # 后退安全检查：执行后退前沿 base_link 后方采样 costmap，避免盲退撞障碍
      enable_safety_check: false      # 是否启用后退轨迹安全检查
      backup_allow_unsafe: false     # true 时即使后方安全检查失败也继续后退，仅建议人工调试/特殊场地使用
      safety_check_distance: 0.5    # 后退方向安全检查距离(m)，建议 >= backup_dist
      
      # 旋转恢复：后退不可行或失败后，按 spin_sequence 配置的小角度序列依次尝试
      spin_sequence: [0.785398, -1.570796, 3.141593]  # 旋转角度序列(rad)，正数左转、负数右转；默认 +45deg -> -90deg -> +180deg
      spin_angle: 3.14              # 兼容保留参数；当前 NavServer 使用 spin_sequence 注册多个旋转动作
      spin_vel: -3.5                # 旋转角速度基准值(rad/s)，序列会按角度正负自动设置方向
      spin_timeout: 5.0             # 旋转动作最大执行时间(s)，超时则该恢复动作失败
      spin_min_progress: 0.20       # 旋转恢复的最小有效角度进展(rad)
      spin_progress_timeout: 1.5    # 旋转时允许无有效进展的最长时间(s)，超过则判定失败
      
      # 弧线后退恢复：在直退和旋转都失败后执行，适合从墙角/局部卡滞中斜向退开
      arc_backup_dist: 0.35         # 弧线后退目标位移(m)，达到该位移后认为动作完成
      arc_backup_vel: -1.5         # 弧线后退线速度(m/s)，应为负值
      arc_backup_left_angular_vel: 2.0  # 左弧线后退角速度(rad/s)
      arc_backup_right_angular_vel: -2.0 # 右弧线后退角速度(rad/s)
      arc_backup_timeout: 2.0       # 弧线后退最大执行时间(s)，超时则该恢复动作失败
      arc_backup_min_progress: 0.10 # 弧线后退的最小有效位移(m)
      arc_backup_progress_timeout: 1.0  # 弧线后退允许无有效进展的最长时间(s)
      arc_backup_enable_safety_check: false  # 是否启用弧线轨迹安全检查
      arc_backup_allow_unsafe: false        # true 时即使弧线安全检查失败也继续执行，仅建议人工调试使用
      arc_backup_safety_check_duration: 1.5 # 弧线轨迹前向预测检查时长(s)
    
    # 脱困系统 (ESCAPING 状态)
    escape:
      # 触发条件
      trigger_costmap_threshold: 99   # Costmap 触发阈值，起点 cost >= 此值时触发脱困
      target_safe_esdf: 0.25           # 目标 ESDF 距离 (m)，搜索大于此值的安全点
      
      # 搜索参数
      search_radius: 1.0              # BFS 最大搜索半径 (m)
      preferred_search_distance: 1.0  # 优先沿车体前后方向搜索安全点的最大距离(m)
      preferred_search_half_angle: 0.2 # 定向搜索半角(rad)

      # 释放动作：先按候选脱困点方位直线前进/后退一小段，再重新搜索最终脱困点
      enable_release_maneuver: true
      backup_dist: 0.35               # 直线释放距离(m)
      backup_vel: -1.5                # 直线释放速度幅值(m/s)，符号会被忽略，由脱困点方位决定前进/后退
      backup_timeout: 1.8             # 直线释放动作超时(s)
      backup_min_progress: 0.03       # 退让阶段最小有效位移(m)
      backup_progress_timeout: 2.0    # 无有效位移超过该时间则切换下一退让动作(s)
      
      # 控制参数
      rotation_speed: 3.0             # 旋转角速度 (rad/s)
      forward_speed: 1.7             # 前进线速度 (m/s)
      yaw_tolerance: 0.1              # 角度对齐容差 (rad, ~6度)
      position_tolerance: 0.1        # 到达位置容差 (m)
      drive_min_progress: 0.05       # 阶段5驶向目标时刷新进展所需的最小距离减少量(m)
      drive_progress_timeout: 1.5    # 阶段5超过该时间未有效接近目标则进入 STUCK recovery(s)
      
      # 超时保护
      timeout: 6.0                   # 脱困最大时长(s)，超时触发 STUCK recovery

two_point_patrol:
  ros__parameters:
    goal_topic: "goal_pose"                 # RViz 2D Goal 默认话题
    navigate_action_name: "navigate"        # nav_server action 名称
    goal_frame: "map"
    check_period_s: 0.1
    near_goal_distance_m: 0.45               # 距目标小于该值即视为“到达附近”
    switch_delay_s: 0.8                      # 到达附近后延时切换到另一个目标
    save_file: "/tmp/nav_two_goal_points.txt"
    auto_start: false                        # true: 读取到2点后自动开始循环
