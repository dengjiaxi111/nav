# perception_config.yaml
# 障碍物感知模块配置

obstacle_perception:
  ros__parameters:
    # 高程分析参数
    robot_height: 0.6           # 机器人高度 (m)
    height_diff_thresh: 0.15    # 高度差阈值，超过此值认为是障碍物 (m)
    occupancy_rate_thresh: 0.3  # 占据率阈值，低于此值可能是稀疏结构
    ground_height: -0.1         # 地面高度偏移量 (相对于当前机器人z坐标, m)
    ceiling_height: 2.0         # 天花板高度偏移量 (相对于当前机器人z坐标, m)
    
    # 聚类参数
    cluster_distance: 0.3       # 聚类距离阈值 (m)
    min_cluster_size: 3         # 最小聚类点数
    max_frame_diff: 5           # 时间聚类最大帧差
    
    # 卡尔曼滤波参数
    process_noise: 0.1          # 过程噪声
    measurement_noise: 0.05     # 测量噪声
    velocity_thresh: 0.1        # 动态障碍物速度阈值 (m/s)
    
    # 跟踪参数
    max_association_dist: 0.5   # 最大数据关联距离 (m)
    max_lost_frames: 10         # 最大丢失帧数
    
    # Grid参数（与ROG-Map一致）
    resolution: 0.05            # 栅格分辨率 (m)
    local_range: 5.0            # 局部感知范围 (m)
