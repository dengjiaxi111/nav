# 台阶检测节点参数配置示例
# 可以通过 launch 文件或命令行参数覆盖

stair_detector:
  # === 输入/输出话题 ===
  input_cloud_topic: "/rog_map/occ"               # ROG-Map 占据点云
  output_target_topic: "/stair_detector/target"   # 台阶目标输出
  output_marker_topic: "/stair_detector/markers"  # 可视化 Marker
  enable_visualization: true
  update_rate: 20.0                               # 检测频率 (Hz)
  
  # === ROI 裁剪参数（在 base_link 坐标系下）===
  roi_x_min: 0.2      # 前方最小距离 (m) - 避免盲区
  roi_x_max: 2.0      # 前方最大距离 (m) - 不关心太远的
  roi_y_min: -0.6     # 左侧范围 (m)
  roi_y_max: 0.6      # 右侧范围 (m)
  roi_z_min: 0.05     # 高度最小值 (m) - 切掉地面噪声
  roi_z_max: 0.5      # 高度最大值 (m) - 忽略高处障碍
  
  # === 聚类参数 ===
  cluster_tolerance: 0.05     # 聚类搜索半径 (m) - 台阶点密集
  min_cluster_size: 200       # 最小聚类点数 - 过滤噪点
  max_cluster_size: 10000     # 最大聚类点数
  
  # === 台阶几何约束（硬约束，确保高精度）===
  single_stair_height: 0.20   # 一级台阶标准高度 (m)
  double_stair_height: 0.35   # 二级台阶标准高度 (m) = 0.20 + 0.15
  height_tolerance: 0.04      # 高度匹配容差 (m) - ±4cm
  
  min_stair_width: 0.35       # 最小台阶宽度 (m) - 排除立柱
  min_stair_depth: 0.15       # 最小台阶深度 (m) - 排除薄板
  max_z_thickness: 0.08       # Z 方向最大厚度 (m) - 防止误识别墙壁
  
  # === 时间跟踪参数 ===
  min_detection_frames: 3     # 连续检测帧数要求（提高置信度）
  lowpass_alpha: 0.7          # 低通滤波系数（0-1，越大越信任新值）
  blind_zone_distance: 0.3    # 进入盲区的距离阈值 (m)
  
# ===== 使用说明 =====
# 
# 1. 启动完整系统（ROG-Map + 台阶检测 + RViz）：
#    ros2 launch rog_map_ros2_node rog_map.launch.py
#
# 2. 单独启动台阶检测节点：
#    ros2 run rog_map_ros2_node stair_detector_node \
#      --ros-args -p input_cloud_topic:=/rog_map/occ
#
# 3. 查看检测结果：
#    ros2 topic echo /stair_detector/target
#
# 4. RViz 可视化：
#    - 添加 MarkerArray: /stair_detector/markers
#    - 绿色框：已锁定台阶
#    - 黄色框：检测中的候选
#    - 红色线：台阶前沿
#
# ===== 调优建议 =====
#
# 如果出现漏检：
# - 增大 roi_x_max（扩大搜索范围）
# - 减小 min_cluster_size（允许更小的聚类）
# - 增大 height_tolerance（放宽高度匹配）
#
# 如果出现误检：
# - 减小 height_tolerance（更严格的高度约束）
# - 增大 min_stair_width（排除窄物体）
# - 增大 min_detection_frames（提高置信度要求）
#
# 如果检测抖动：
# - 减小 lowpass_alpha（更强的平滑）
# - 增大 min_detection_frames（更稳定的跟踪）
