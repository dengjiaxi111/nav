rog_map:
  # ESDF configuration
  esdf:
    resolution: 0.1
    enable: false
    local_update_box: [16.0, 16.0, 3.0]

  # PCD loading
  load_pcd_en: false
  pcd_name: "map.pcd"

  # Map sliding
  map_sliding:
    enable: true
    threshold: 2.5

  # Fix map origin
  fix_map_origin: [0.0, 0.0, 0.0]

  # Frontier extraction
  frontier_extraction_en: false

  # ROS callback
  ros_callback:
    enable: true
    cloud_topic: "/cloud_registered"
    odom_topic: "/Odometry"
    odom_timeout: 0.5

  # Visualization
  visualization:
    enable: true
    use_dynamic_reconfigure: true
    pub_unknown_map_en: false   
    frame_id: "odom"
    time_rate: 10.0           
    starvation_timeout: 0.3   # [s] 可视化抢不到地图锁超过该时间后，阻塞刷新一次防止 /rog_map/occ 饥饿；0 表示禁用保底
    frame_rate: 100
    range: [16.0, 16.0, 2.0]


  # === 分辨率配置 ===
  # ROG-Map用0.025m保证3D精度，2D Projector用0.05m与导航地图对齐
  # 这样每个2D栅格对应2×2个3D体素，确保完整覆盖
  resolution: 0.025              # ← 3D体素分辨率（保持高精度）
  inflation_resolution: 0.025    # ← 与主分辨率一致   

  # Unknown inflation - 建议关闭以提升性能
  unk_inflation_en: false       # ← 关闭unknown膨胀，大幅减少计算
  unk_inflation_step: 1

  # Inflation - 保持1步膨胀
  inflation_step: 1
  intensity_thresh: -1

  # Map size - 减小z方向范围
  map_size: [16.0, 16.0, 2.0]  

  # Point filtering 
  point_filt_num: 1           

  # Raycasting - 性能优化配置
  raycasting:
    enable: true
    batch_update_size: 1       
    unk_thresh: 0.5
    
    # === 概率更新参数 ===
    p_hit: 0.90
    p_miss: 0.45
    p_min: 0.12
    p_max: 0.94
    p_occ: 0.56
    p_free: 0.35
    ray_range: [0.1, 10.0]     
    local_update_box: [16.0, 16.0, 1.8]  # ← 缩小更新范围
    
    # TBB Parallelization - 优化并行参数
    parallel_enable: true
    max_threads: 4          
    grain_size: 256             
    min_cloud_size_for_parallel: 200 
    
    # Fading机制
    fading_enable: true
    fading_frame_thresh: 60       

  # Virtual ground and ceiling
  virtual_ground_height: -1.0
  virtual_ceil_height: 5.0

  # Performance logging
  enable_performance_log: false

# 2D地图投影参数已迁移到标准ROS2参数文件：
#   rog_map_ros2_node/config/projector_params.yaml
