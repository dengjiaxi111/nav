# Stair Detector 参数配置
# 注意：这些参数会被 integration_component 加载并传递给 StairDetector

/**:
  ros__parameters:
    # Input/Output topics
    input_cloud_topic: "/rog_map/occ"  
    output_target_topic: "/stair_detector/target"
    output_marker_topic: "/stair_detector/markers"
    enable_visualization: true
    update_rate: 20.0

    # Frame IDs
    target_frame: "base_link"  # 目标坐标系（机器人本体）
    map_frame: "odom"          # 地图坐标系

    # ROI filtering (in base_link frame)
    roi_x_min: 0.2
    roi_x_max: 5.0
    roi_y_min: -3.0
    roi_y_max: 3.0
    roi_z_min: -0.05
    roi_z_max: 0.5

    # Clustering parameters
    cluster_tolerance: 0.05
    min_cluster_size: 150
    max_cluster_size: 10000

    # Stair geometry constraints
    single_stair_height: 0.20
    double_stair_height: 0.35
    height_tolerance: 0.05
    min_stair_width: 0.3
    min_stair_depth: 0.05
    max_z_thickness: 0.4

    # === 方案1: 法向量估计参数 ===
    enable_normal_estimation: true       # 启用法向量筛选
    min_planarity: 0.7                   # 平面性阈值 (1 - λ0/λ1)
    horizontal_normal_z_min: 0.85        # 水平面法向量z分量下限
    horizontal_points_ratio_min: 0.6     # 水平点占比下限
    normal_min_points: 50                # 法向量计算最小点数

    # === 方案2: 多平面分割参数 ===
    enable_plane_segmentation: true      # 启用RANSAC平面分割
    ransac_distance_threshold: 0.02      # RANSAC内点距离阈值 (m)
    ransac_max_iterations: 100           # RANSAC最大迭代次数
    min_plane_points: 150                # 最小平面点数
    ground_plane_z_tolerance: 0.05       # 地面平面z容差 (m)
    max_planes: 3                        # 最大提取平面数

    # Prefilter (grid vertical occupancy)
    cell_size_xy: 0.05
    min_cell_points: 5
    min_cell_height: 0.05
    max_cell_height: 0.4
    max_cell_top_z: 0.5

    # Temporal tracking
    min_detection_frames: 5
    lowpass_alpha: 0.7
    blind_zone_distance: 0.3
