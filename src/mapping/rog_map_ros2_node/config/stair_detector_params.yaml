# Stair Detector 参数配置
# 注意：这些参数会被 integration_component 加载并传递给 StairDetector

/**:
  ros__parameters:
    # Set false to skip creating StairDetector in integration_node.
    stair_detector.enable: false

    # Input/Output topics
    input_cloud_topic: "/rog_map/occ"  
    output_target_topic: "/stair_detector/target"
    output_marker_topic: "/stair_detector/markers"
    enable_visualization: true
    update_rate: 20.0

    # Frame IDs
    target_frame: "base_link"  # 目标坐标系（机器人本体）
    map_frame: "odom"          # 地图坐标系


    # 台阶几何约束
    single_stair_height: 0.20      # 一级台阶 20cm
    double_stair_height: 0.35      # 二级台阶 35cm
    height_tolerance: 0.04         # 容差 ±4cm
    
    min_stair_width: 0.35          # 最小宽度 35cm
    min_stair_depth: 0.20          #  增加到20cm，排除薄墙壁
    max_z_thickness: 0.10          #  增加到10cm，允许台阶边缘噪声
    
    # ROI 范围
    roi_x_min: 0.3                 #  增加到30cm，避免太近误检
    roi_x_max: 2.5                 #  减少到2.5m，专注近距离台阶
    roi_y_min: -0.6                #  收窄到±60cm，减少侧面墙壁干扰
    roi_y_max: 0.6                 #  收窄到±60cm
    roi_z_min: 0.10                #  提高到10cm，排除地面噪声
    roi_z_max: 0.40                #  降低到40cm，排除过高的墙壁
    
    # 聚类参数
    cluster_tolerance: 0.05        # 聚类半径 5cm
    min_cluster_size: 300          #  增加到300，过滤小碎片和噪声
    
    # 状态机
    min_detection_frames: 8        # 增加到8帧，提高识别稳定性
    lowpass_alpha: 0.7             # 低通滤波系数
    blind_zone_distance: 0.3       # 盲区距离 30cm
