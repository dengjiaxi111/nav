/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 3
        max_iteration: 3
        filter_size_surf: 0.3
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "./test.pcd"

        common:
            lid_topic1:  "/livox/lidar_192_168_1_199"
            lid_topic2:  "/livox/lidar_192_168_1_195"
            imu_topic:  "/livox/imu_192_168_1_199"
            time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
            time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

        preprocess:
            lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 4 for any other pointcloud input
            scan_line:  4
            blind: 0.6
            timestamp_unit: 3
            scan_rate: 20

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    360.0
            det_range:     100.0

            init_pos: [0.0, 0.0, 0.0]
            init_rot: [0.0, 0.0, 0.0,1.0]

            extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic
            extrinsic_T: [ -0.011, -0.02329, 0.04412 ] #The  extrinsic parameters in FAST-LIO is defined as the LiDAR's pose (position and rotation matrix) in IMU body frame (i.e. the IMU is the base frame)
            extrinsic_R: [ 1., 0., 0.,
                            0., 1., 0.,
                            0., 0., 1.]

            # extrinsic_T: [ -0.011, -0.1226, 0.01028 ] #The extrinsic parameters in FAST-LIO is defined as the LiDAR's pose (position and rotation matrix) in IMU body frame (i.e. the IMU is the base frame)
            # extrinsic_R: [ 1., 0.,0. ,
            #                 0., 0.7660, 0.6428,
            #                 0., -0.6428, 0.7660]
            
            should_relocalization_when_start: false
            should_relocalization_while_running: false    
        ICP:
            icp_max_correspondence_distance: 5.0
            icp_transformation_epsilon: 1.0e-8
            icp_euclidean_fitness_epsilon: 1.0e-8
            icp_maximum_iterations: 50
            icp_need_iterations: 1

        publish:
            path_en: false                # true: publish Path
            effect_map_en: false         # true: publish Effects
            map_en: false                 # true: publish Map cloud
            scan_publish_en:  true       # false: close all the point cloud output
            dense_publish_en: true      # false: low down the points number in a global-frame point clouds scan.
            scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

        pcd_save:
            pcd_save_en: true
            interval: 50000                 # how many LiDAR frames saved in each pcd file; 
                                        # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
