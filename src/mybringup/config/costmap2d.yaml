global_costmap:
  global_costmap:
    ros__parameters:
      #map config
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: map
      robot_base_frame: base_link_fake
      use_sim_time: false
      #initial_transform_timeout: 25   #Time to wait for the transform from robot base frame to global frame to become available
      robot_radius: 0.25
      lethal_cost_threshold: 255      #100 default
      resolution: 0.05
      track_unknown_space: false
      rolling_window: false
      trinary_costmap: true  #If occupancy grid map should be interpreted as only 3 values
      #plugin config
      plugins: ["static_layer","STV_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      STV_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled:               true
        voxel_decay:           1.4     #seconds if linear, e^n if exponential
        decay_model:           0      #0=linear, 1=exponential, -1=persistent
        voxel_size:            0.05  #meters
        track_unknown_space:   true   #default space is unknown
        observation_persistence: 0.0  #seconds
        max_obstacle_height:   2.5    #meters
        mark_threshold:        0      #voxel height
        update_footprint_enabled: true
        combination_method:    1      #1=max, 0=override
        origin_z:              0.0    #meters
        publish_voxel_map:     false   # default off
        transform_tolerance:   0.3    # seconds
        mapping_mode:          false  # default off, saves map not for navigation
        map_save_duration:     60.0     #default 60s, how often to autosave
        observation_sources:   pointcloud 
        pointcloud:
          data_type: PointCloud2
          topic: /cloud_filtered
          marking: true
          clearing: false
          obstacle_range:        30.0    #meters
          raytrace_range:       30.0
          min_obstacle_height: -1.0     #default 0, meters
          max_obstacle_height: 2.0     #defaule 3, meters
          expected_update_rate: 0.0    #default 0, if not updating at this rate at least, remove from buffer
          observation_persistence: 0.0 #default 0, use all measurements taken during now-value, 0=latest 
          inf_is_valid: true          #default false, for laser scans
          #clear_after_reading: true    #default false, clear the buffer after the layer gets readings from it
          #filter: "voxel"              #default passthrough, apply "voxel", "passthrough", or no filter to sensor data, recommended to have at one filter on
          voxel_min_points: 0          #default 0, minimum points per voxel for voxel filter

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.2
        inflation_radius: 1.2
      always_send_full_costmap: True

local_costmap:
  local_costmap:
    ros__parameters:
      #map config
      update_frequency: 50.0
      publish_frequency: 50.0
      global_frame: odom
      robot_base_frame: base_link_fake
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.1
      lethal_cost_threshold: 255
      #plugin config
      plugins: ["static_layer", "STV_layer","inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      STV_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled:               true
        voxel_decay:           0.5     #seconds if linear, e^n if exponential
        decay_model:           0      #0=linear, 1=exponential, -1=persistent
        voxel_size:            0.05  #meters
        track_unknown_space:   true   #default space is unknown
        observation_persistence: 0.0  #seconds
        max_obstacle_height:   2.0    #meters
        mark_threshold:        0      #voxel height
        update_footprint_enabled: true
        combination_method:    1      #1=max, 0=override
        obstacle_range:        5.0    #meters
        origin_z:              0.0    #meters
        publish_voxel_map:     false   # default off
        transform_tolerance:   0.3    # seconds
        mapping_mode:          false  # default off, saves map not for navigation
        map_save_duration:     60.0     #default 60s, how often to autosave
        observation_sources:   pointcloud 
        pointcloud:
          data_type: PointCloud2
          topic: /cloud_filtered
          marking: true
          clearing: false
          min_obstacle_height: -1.0     #default 0, meters
          max_obstacle_height: 1.0     #defaule 3, meters
          expected_update_rate: 0.0    #default 0, if not updating at this rate at least, remove from buffer
          observation_persistence: 0.0 #default 0, use all measurements taken during now-value, 0=latest 
          inf_is_valid: true          #default false, for laser scans
          #clear_after_reading: true    #default false, clear the buffer after the layer gets readings from it
          #filter: "voxel"              #default passthrough, apply "voxel", "passthrough", or no filter to sensor data, recommended to have at one filter on
          voxel_min_points: 0          #default 0, minimum points per voxel for voxel filter

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: local_scan
        local_scan:
            topic: /scan
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            data_type: "LaserScan"
            raytrace_max_range: 5
            raytrace_min_range: 0
            obstacle_max_range: 5
            obstacle_min_range: 0.3
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.8
      always_send_full_costmap: True
